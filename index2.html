<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tast</title>
  </head>
  <body>
    <form action="#">
      아이디&nbsp;&nbsp;&nbsp;&nbsp;<input type="text" name="ID" />
      <br />패스워드 <input type="text" name="pass" />
      <br />
      <br />
      <input type="submit" />
    </form>
    <br /><br /><br /><br />

    <form action="#">
      <input type="text" name="text" value="아이디" /><br />
      <input type="password" name="password" value="password" /><br />
      <input type="file" name="file" value="file" /><br />
      <input type="checkbox" name="checkbox" value="checkbox" /><br />
      <input type="radio" name="radio" value="radio" /><br />

      <input type="button" name="button" value="button" /><br />
      <input type="reset" name="reset" value="reset" /><br />
      <input type="image" src="https://placehold.co/600x400" /><br />
      <br /><br /><br />
    </form>
    <br /><br /><br />

    <form action="#">
      <table>
        <tr>
          <td><label for="username">이름</label></td>
          <td><input type="text" id="username" value="홍길동" /></td>
        </tr>
        <tr>
          <td>성별</td>
          <td>
            <input type="radio" value="m" name="gender" />
            <label for="">남자</label>
            <input type="radio" value="W" name="gender" />
            <label for="">여자</label>
          </td>
        </tr>
      </table>
      <br />
      <input type="submit" value="전송" />
    </form>

    <form>
      <select multiple="multiple">
        <option value="">김밥</option>
        <option value="">떡볶이</option>
        <option value="">어묵</option>
        <option value="">순대</option>
      </select>
    </form>

    <form action="">
      <select name="" id="">
        <optgroup label="ABC">
          <option value="">그룹 1 첫번째</option>
          <option value="">그룹 1 두번째</option>
          <option value="">그룹 1 세번째</option>
        </optgroup>
        <optgroup label="DEF">
          <option value="">그룹 2 첫번째</option>
          <option value="">그룹 2 두번째</option>
        </optgroup>
      </select>
    </form>

    <form>
      <fieldset>
        <legend>입력양식</legend>
        <table>
          <tr>
            <td><label for="name">이름</label></td>
            <td><input type="text" id="name" /></td>
          </tr>
          <tr>
            <td><label for="name">이메일</label></td>
            <td><input type="email" id="nail" /></td>
          </tr>
        </table>
        <input type="submit" />
      </fieldset>
    </form>

    <form action="">
      <textarea name="" id=""></textarea>
    </form>
  </body>
</html>

<!-- form 폼, action="" 입력된걸보내는경로""  -->
<!-- input 입력, name"" 이름""(개발자가 구별하기 위해서)-->
<!-- get 검색했을때 입력한게 주소입력란에 보이는것(검색 등), post 입력한게 주소입력란에 안보이는거(로그인&개인정보)  -->
<!-- value 보내주는 값 -->
<!-- type="" 경로"", text 글자, submit 전송&보내기, 선택할때 체크박스냐 선택박스냐 checkbox □▣□▣ radio ○○◎○ -->
<!-- https://placehold.co/600x400 /placehold 미리만들어진틀, 600x400 사이즈 -->
<!-- <label for="username">이름</label></td> 보여주기위한 안내문 -->
<!-- id= 위치이름설정 -->
